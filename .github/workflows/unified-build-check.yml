name: Unified Next Payload Build Check

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VERCEL_ENV: preview
      NODE_OPTIONS: --max-old-space-size=8000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --legacy-peer-deps --silent

      - name: Build website and Payload
        shell: bash
        run: |
          set +e
          npm run build > build.log 2>&1
          status=$?
          if [ $status -ne 0 ]; then
            echo "===== RELEVANT BUILD ERROR ====="
            tail -n 100 build.log
            exit $status
          fi
          tail -n 40 build.log
